<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Radar One Page</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#071018;--panel:#0c1623;--line:rgba(255,255,255,.08);--text:#e7eef8;--muted:#9db0c7;--up:#2ecc71;--down:#ff5b5b;--accent:#59a7ff}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Apple SD Gothic Neo,Segoe UI,sans-serif}
    body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(89,167,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(89,167,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
    header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:rgba(7,16,24,.95);backdrop-filter:blur(10px)}
    .logo{font-weight:900;font-size:22px;letter-spacing:1px;color:var(--accent)} .sub{font-size:12px;color:var(--muted);letter-spacing:2px}
    main{max-width:1400px;margin:0 auto;padding:22px}
    .title{font-size:56px;line-height:1;margin:18px 0 10px;font-weight:900;letter-spacing:1px}
    .desc{color:var(--muted);margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px}
    .card,.panel{background:rgba(12,22,35,.9);border:1px solid var(--line);border-radius:16px;padding:18px}
    .label{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
    .value{font-size:28px;font-weight:800;margin:8px 0 6px}.chg{font-size:16px;font-weight:700}.up{color:var(--up)}.down{color:var(--down)}.neutral{color:var(--muted)}
    .mini{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:14px 0 16px}.mini .card{padding:14px}.mini .value{font-size:20px}
    .status{display:inline-block;padding:2px 8px;border-radius:99px;border:1px solid var(--line);font-size:12px}.ok{color:var(--up)} .err{color:var(--down)}
    .logs{white-space:pre-wrap;line-height:1.6;color:#ffc2c2;font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:13px}
    canvas{width:100%;height:280px}
    @media (max-width:1100px){.grid,.grid2,.mini{grid-template-columns:1fr 1fr}} @media (max-width:700px){.grid,.grid2,.mini{grid-template-columns:1fr}.title{font-size:40px}}
  </style>
</head>
<body>
<header>
  <div>
    <div class="logo">MARKET RADAR</div>
    <div class="sub">ONE PAGE STABLE SNAPSHOT</div>
  </div>
  <div id="updated" class="sub">--</div>
</header>
<main>
  <div class="title">OVERVIEW</div>
  <div class="desc">한 페이지만 먼저 안정적으로 살린 버전입니다. 브라우저는 저장소의 JSON만 읽습니다.</div>

  <div class="mini" id="mini"></div>

  <div class="grid" id="cards"></div>

  <div class="grid2">
    <div class="panel"><div class="label">KOSPI vs KOSDAQ · 최근 120거래일</div><canvas id="chartKr"></canvas></div>
    <div class="panel"><div class="label">Bitcoin vs Samsung · 최근 120거래일</div><canvas id="chartMix"></canvas></div>
  </div>

  <div class="grid2">
    <div class="panel">
      <div class="label">수집 상태</div>
      <div id="statusTable"></div>
    </div>
    <div class="panel">
      <div class="label">에러 로그</div>
      <div id="logs" class="logs"></div>
    </div>
  </div>
</main>
<script>
async function load(){
  const latest = await fetch('./data/latest.json?v=' + Date.now()).then(r=>r.json());
  const history = await fetch('./data/history.json?v=' + Date.now()).then(r=>r.json());
  document.getElementById('updated').textContent = latest.generated_at || '--';

  const miniOrder = ['kospi','kosdaq','usdkrw','bitcoin'];
  const cardsOrder = ['kospi','kosdaq','samsung','usdkrw','bitcoin'];
  const mini = document.getElementById('mini');
  const cards = document.getElementById('cards');
  const assets = latest.assets || {};

  function fmt(v, unit=''){ if(v===null||v===undefined) return '데이터 없음'; const n=Number(v); return (unit==='USD'?'$':'') + n.toLocaleString('ko-KR',{maximumFractionDigits:2}); }
  function chg(a){ if(a.change_pct===null||a.change_pct===undefined) return '<span class="neutral">변화값 없음</span>'; const cls=a.change>=0?'up':'down'; const arrow=a.change>=0?'▲':'▼'; return `<span class="${cls}">${arrow} ${Math.abs(a.change).toLocaleString('ko-KR',{maximumFractionDigits:2})} (${a.change_pct.toFixed(2)}%)</span>`; }

  mini.innerHTML = miniOrder.map(k=>{ const a=assets[k]||{}; return `<div class="card"><div class="label">${a.label||k}</div><div class="value ${a.change>=0?'up':(a.change<0?'down':'neutral')}">${fmt(a.value,a.unit)}</div></div>` }).join('') + `<div class="card"><div class="label">Fear & Greed</div><div class="value ${latest.fear_greed?.score>=50?'up':'down'}">${latest.fear_greed?.score ?? '데이터 없음'}</div></div>`;

  cards.innerHTML = cardsOrder.map(k=>{ const a=assets[k]||{}; return `<div class="card"><div class="label">${a.label||k}</div><div class="value ${a.change>=0?'up':(a.change<0?'down':'neutral')}">${fmt(a.value,a.unit)}</div><div class="chg">${chg(a)}</div><div class="sub muted">${a.source||''}</div></div>` }).join('');

  const rows = Object.values(assets).map(a=>`<div style="display:grid;grid-template-columns:2fr 1fr 2fr;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)"><div>${a.label}</div><div><span class="status ${a.status==='ok'?'ok':'err'}">${a.status}</span></div><div style="color:#9db0c7;font-size:13px">${a.source}</div></div>`).join('') + `<div style="display:grid;grid-template-columns:2fr 1fr 2fr;gap:10px;padding:8px 0"><div>Fear & Greed</div><div><span class="status ${latest.fear_greed?.status==='ok'?'ok':'err'}">${latest.fear_greed?.status||'error'}</span></div><div style="color:#9db0c7;font-size:13px">${latest.fear_greed?.source||''}</div></div>`;
  document.getElementById('statusTable').innerHTML = rows;
  document.getElementById('logs').textContent = (latest.logs||[]).length ? latest.logs.join('\n') : '에러 없음';

  function series(name){ return (history.series && history.series[name]) ? history.series[name] : []; }
  function renderChart(id, aName, bName, aLabel, bLabel){
    const a = series(aName); const b = series(bName);
    const labels = a.map(x=>x.date);
    const aVals = a.map(x=>x.value); const bVals = b.map(x=>x.value);
    new Chart(document.getElementById(id), { type:'line', data:{ labels, datasets:[{label:aLabel,data:aVals,borderColor:'#59a7ff',tension:.2,pointRadius:0},{label:bLabel,data:bVals,borderColor:'#ff6b6b',tension:.2,pointRadius:0}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#cfe2f7'}}}, scales:{x:{ticks:{color:'#8ca3ba', maxTicksLimit:8}, grid:{color:'rgba(255,255,255,.04)'}}, y:{ticks:{color:'#8ca3ba'}, grid:{color:'rgba(255,255,255,.04)'}}}}});
  }
  renderChart('chartKr','kospi','kosdaq','KOSPI','KOSDAQ');
  renderChart('chartMix','bitcoin','samsung','Bitcoin','Samsung');
}
load();
</script>
</body>
</html>
